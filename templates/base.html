<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Туристичні тури{% endblock %}</title>

  <!-- Bootstrap 5.3 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-semibold" href="{{ url_for('index') }}">
      <i class="bi bi-airplane-fill me-2"></i>TripSearch
    </a>
    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}"
             href="{{ url_for('index') }}">Всі тури</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'tour_operator' %}active{% endif %}"
             href="{{ url_for('tour_operator') }}">По туроператору</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'find_days' %}active{% endif %}"
             href="{{ url_for('find_days') }}">По днях</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'most_expensive' %}active{% endif %}"
             href="{{ url_for('most_expensive') }}">Найдорожчий</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'search' %}active{% endif %}"
             href="{{ url_for('search') }}">Вибір запиту</a>
        </li>
        <li class="nav-item">
          <a class="nav-link btn btn-outline-light btn-sm ms-2 px-3
             {% if request.endpoint == 'add_trip' %}active{% endif %}"
             href="{{ url_for('add_trip') }}">
            <i class="bi bi-plus-lg me-1"></i>Додати тур
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Flash-повідомлення -->
<div class="container mt-3">
  {% with messages = get_flashed_messages(with_categories=True) %}
    {% for category, message in messages %}
    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
      <i class="bi {% if category == 'success' %}bi-check-circle-fill
                   {% elif category == 'warning' %}bi-exclamation-triangle-fill
                   {% else %}bi-x-circle-fill{% endif %} me-2"></i>
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
  {% endwith %}
</div>

<!-- Контент -->
<div class="container mt-4 mb-5">
  {% block body %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
